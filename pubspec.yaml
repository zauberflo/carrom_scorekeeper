name: carrom_scorekeeper
description: "A professional carrom scoring app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  audioplayers: ^6.5.1
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.4
  firebase_core: ^4.4.0
  firebase_database: ^12.1.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  # Hier sind die Assets nun korrekt eingerückt ergänzt:
  assets:
    - assets/click.mp3
    - assets/icon/app_icon.png